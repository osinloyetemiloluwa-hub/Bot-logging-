services:
  - type: web
    name: discord-bot
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: USE_SQLITE
        value: "true"
    healthCheckPath: /health

  - type: web
    name: discord-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT api:app
    envVars:
      - key: USE_SQLITE
        value: "true"
    healthCheckPath: /

# No databases section
