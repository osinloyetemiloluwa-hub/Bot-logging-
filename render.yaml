startCommand: python debug.py && python bot.py
# Render Blueprint - Discord Logger Bot
# Both services run as web services (free plan limitation)

services:
  # Discord Bot - Running as web service with keep-alive
  - type: web
    name: discord-bot
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: discord-logs-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health

  # Flask API - Web service
  - type: web
    name: discord-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: discord-logs-db
          property: connectionString
      - key: FLASK_DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/health

databases:
  - name: discord-logs-db
    plan: free
    databaseName: discord_logs
    user: discord_user
    ipAllowList: []
