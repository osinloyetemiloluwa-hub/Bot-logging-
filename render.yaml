services:
  - type: web
    name: discord-logger
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn combined:app --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: discord-logs-db
          property: connectionString

databases:
  - name: discord-logs-db
    plan: free
    databaseName: discord_logs
