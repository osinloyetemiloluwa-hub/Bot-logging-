services:
  - type: web
    name: discord-bot
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: discord-logs-db
          property: connectionString
    healthCheckPath: /health

  - type: web
    name: discord-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: discord-logs-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: discord-logs-db
    plan: free
    databaseName: discord_logs
    user: discord_user
    ipAllowList: []
